<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seclucity Telephone Directory</title>
  <link rel="stylesheet" href="style.css?v=0.15" />
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <h1 class="logo">
        <img src="logo.jpg?v=0.15" alt="Seclucity — Seek. Clues. City" />
      </h1>
      <p class="subtitle">Solution Search System</p>
      <p class="edition">Greater Tulsa Business Directory</p>
    </div>
  </header>

  <main>
    <section class="search-bar">
      <label for="search" class="visually-hidden">Search the directory</label>
      <input
        type="search"
        id="search"
        placeholder="Search by name&hellip;"
        autocomplete="off"
        spellcheck="false"
      />
      <p class="search-hint" id="result-count">Loading listings&hellip;</p>
    </section>

    <section class="directory" id="directory" aria-live="polite">
      <!-- Listings are injected here by script.js -->
    </section>
  </main>

  <footer class="colophon">
    <p>Seclucity Telephone Co. &bull; Published Annually</p>
    <p class="fine-print">
      For emergencies dial 9&ndash;1&ndash;1. Directory assistance: dial 4&ndash;1&ndash;1.
    </p>
    <p class="build-tag">Directory build v0.15 &bull; 2026-06-25</p>
  </footer>

  <script src="script.js?v=0.15"></script>
</body>
</html>
